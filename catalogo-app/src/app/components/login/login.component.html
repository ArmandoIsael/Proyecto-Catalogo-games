<div class="login-container">
  <div class="login-card">
    <h2 class="login-title" style="text-align: center; margin-bottom: 5px;"> Catalogo Games🎮</h2>
    <p style="text-align: center; color: #aaa; margin-bottom: 25px;">Inicia sesión para ver tu biblioteca</p>

    <div class="input-group">
      <label for="username">Usuario</label>
      <input type="text" id="username" placeholder="Ingresa tu usuario" [(ngModel)]="username">
    </div>

    <div class="input-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="Ingresa tu contraseña (1234)" [(ngModel)]="password">
    </div>

    <button (click)="onLogin()" class="btn-login">Entrar a mi Biblioteca</button>
  </div>
</div>
